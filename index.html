<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USF Pattern Database</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#17183B;--navy2:#1f2048;--navy-light:rgba(23,24,59,0.07);
  --gold:#C9B27E;--gold2:#b89d68;--gold-bg:rgba(201,178,126,0.12);--gold-border:rgba(201,178,126,0.4);
  --red:#AF0129;--red-bg:rgba(175,1,41,0.07);--red-border:rgba(175,1,41,0.25);
  --green:#1a7a4a;--green-bg:rgba(26,122,74,0.09);--green-border:rgba(26,122,74,0.3);
  --bg:#fff;--bg2:#f8f7f5;--bg3:#f1efe9;
  --border:#e5e1d8;--border2:#ccc8be;
  --text2:rgba(23,24,59,0.6);--text3:rgba(23,24,59,0.38);
  --radius:8px;--font:'DM Sans',sans-serif;
  --shadow:0 1px 3px rgba(23,24,59,0.08);--shadow-md:0 4px 16px rgba(23,24,59,0.12);
}
body{font-family:var(--font);background:var(--bg);color:var(--navy);height:100vh;overflow:hidden;font-size:14px}
.app{display:grid;grid-template-columns:268px 1fr;height:100vh}
.sidebar{background:var(--navy);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:18px 14px 14px;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.logo-text{font-size:13px;font-weight:600;color:#fff;line-height:1.2}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.32);letter-spacing:.08em;text-transform:uppercase;margin-top:1px}
.sb-search{position:relative}
.sb-search input{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);padding:7px 10px 7px 29px;color:#fff;font-family:var(--font);font-size:13px;outline:none;transition:all .2s}
.sb-search input:focus{background:rgba(255,255,255,0.1);border-color:rgba(201,178,126,0.45)}
.sb-search input::placeholder{color:rgba(255,255,255,0.26)}
.sb-si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.26);pointer-events:none;font-size:14px}
.brand-list{flex:1;overflow-y:auto;padding:6px 0}
.brand-list::-webkit-scrollbar{width:3px}
.brand-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.bh{display:flex;align-items:center;gap:7px;padding:7px 14px;cursor:pointer;user-select:none;transition:background .15s}
.bh:hover{background:rgba(255,255,255,0.04)}
.bh.open{background:rgba(201,178,126,0.1)}
.bh-chev{font-size:9px;color:rgba(255,255,255,0.26);transition:transform .2s;flex-shrink:0}
.bh-chev.open{transform:rotate(90deg);color:var(--gold)}
.bh-name{font-size:13px;font-weight:500;color:rgba(255,255,255,0.8);flex:1}
.bh-count{font-size:10px;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.07);padding:1px 6px;border-radius:10px}
.pl{display:none;padding-bottom:4px}
.pl.open{display:block}
.pi{padding:6px 14px 6px 32px;cursor:pointer;font-size:12.5px;color:rgba(255,255,255,0.48);transition:all .15s;border-left:2px solid transparent}
.pi:hover{color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.035)}
.pi.active{color:var(--gold);border-left-color:var(--gold);background:rgba(201,178,126,0.1)}
.pi-name{font-weight:500;margin-bottom:2px;line-height:1.3}
.badges{display:flex;gap:3px;flex-wrap:wrap}
.bdg{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:500}
.bdg.g{background:rgba(26,122,74,0.22);color:#6dcf9a}
.bdg.a{background:rgba(201,178,126,0.2);color:var(--gold)}
.bdg.r{background:rgba(175,1,41,0.2);color:#e07070}
.sb-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.btn-add-sb{width:100%;background:var(--gold);color:var(--navy);border:none;border-radius:var(--radius);padding:9px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-add-sb:hover{background:var(--gold2)}
.main{display:flex;flex-direction:column;overflow:hidden}
.main-head{padding:0 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;min-height:52px;gap:10px;flex-shrink:0}
.bc{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px}
.bc .sep{color:var(--border2)}
.bc .cur{color:var(--navy);font-weight:500}
.head-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.hst{font-size:12px;color:var(--text3)}
.hst.saved{color:var(--green)}
.hst.saving{color:var(--gold2)}
.content{flex:1;overflow-y:auto;padding:24px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.btn{padding:6px 14px;border-radius:var(--radius);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--navy)}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy2)}
.btn-danger{background:transparent;border:1px solid var(--red-border);color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:4px 11px;font-size:12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.pt-bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.pt-text{font-size:22px;font-weight:700;color:var(--navy);letter-spacing:-.02em;line-height:1.2}
.pt-edit-form{display:none;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center}
.pt-edit-form input{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--navy);font-family:var(--font);font-size:13px;outline:none}
.pt-edit-form input:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-bg)}
.edit-btn{background:transparent;border:1px solid var(--border);border-radius:var(--radius);padding:5px 11px;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font)}
.edit-btn:hover{border-color:var(--gold-border);color:var(--navy);background:var(--gold-bg)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.sec{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.sec-head{padding:11px 14px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border);background:var(--bg2)}
.sec-title{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.06em}
.sec-body{padding:14px}
.tgl-grp{display:flex;gap:8px;flex-wrap:wrap}
.tgl{background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);padding:7px 16px;font-size:13px;cursor:pointer;transition:all .18s;font-family:var(--font);color:var(--text2);font-weight:500}
.tgl:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-light)}
.tgl.on{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(23,24,59,0.22)}
.pg-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.pos-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg2);border:2px solid var(--border);border-radius:var(--radius);margin-bottom:7px;transition:all .18s;cursor:pointer}
.pos-row:hover{border-color:var(--navy)}
.pos-row.on{background:var(--green-bg);border-color:var(--green)}
.pos-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:#fff;transition:all .15s}
.pos-row.on .pos-check{background:var(--green);border-color:var(--green)}
.pos-label{font-size:13px;font-weight:500;flex:1;transition:color .15s}
.pos-row.on .pos-label{color:var(--green)}
.thumb-img{width:44px;height:33px;border-radius:5px;border:1px solid var(--border);object-fit:cover;cursor:pointer;flex-shrink:0;transition:transform .15s;box-shadow:var(--shadow)}
.thumb-img:hover{transform:scale(1.08)}
.thumb-add{width:44px;height:33px;border-radius:5px;border:2px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;flex-shrink:0;transition:all .15s;color:var(--text3)}
.thumb-add:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-bg)}
.other-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border:2px dashed var(--border);border-radius:var(--radius);margin-bottom:7px;transition:border-color .15s}
.other-row:hover{border-color:var(--border2)}
.other-check{width:18px;height:18px;border-radius:4px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:#fff;cursor:pointer;transition:all .15s}
.other-check.on{background:var(--green);border-color:var(--green)}
.other-input{flex:1;background:transparent;border:none;outline:none;font-family:var(--font);font-size:13px;color:var(--navy);font-weight:500}
.other-input::placeholder{color:var(--text3);font-weight:400}
.color-row{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:7px;transition:border-color .15s}
.color-row:hover{border-color:var(--border2)}
.cswatch{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);flex-shrink:0;box-shadow:var(--shadow)}
.cname{font-size:13px;font-weight:600;flex:1}
.ccode{font-size:11px;color:var(--text2);background:var(--bg3);padding:2px 7px;border-radius:4px;border:1px solid var(--border);font-weight:500}
.cyears{font-size:11px;color:var(--text3);min-width:72px}
.sub-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px}
.sub-name{font-size:13px;font-weight:600;flex:1}
.sub-yrs{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-size:11px;font-family:var(--font);color:var(--text2);outline:none;width:110px;transition:border-color .2s}
.sub-yrs:focus{border-color:var(--gold-border)}
.btn-icon{background:transparent;border:none;cursor:pointer;color:var(--text3);padding:4px 6px;border-radius:4px;transition:all .15s;font-size:13px;line-height:1}
.btn-icon:hover{background:var(--red-bg);color:var(--red)}
.rich-toolbar{display:flex;gap:3px;padding:7px 10px;border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;background:var(--bg2);flex-wrap:wrap;align-items:center}
.rich-btn{background:transparent;border:1px solid transparent;border-radius:4px;padding:3px 7px;cursor:pointer;font-size:12px;font-family:var(--font);color:var(--text2);transition:all .15s;line-height:1.4}
.rich-btn:hover{background:var(--bg3);border-color:var(--border);color:var(--navy)}
.rsep{width:1px;background:var(--border);margin:0 3px;height:18px;align-self:center}
.rich-editor{border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);padding:12px;min-height:120px;outline:none;font-family:var(--font);font-size:13px;line-height:1.7;color:var(--navy);background:var(--bg)}
.rich-editor:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-bg)}
.rich-editor img{max-width:100%;border-radius:4px;margin:4px 0;border:1px solid var(--border)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--gold);background:var(--gold-bg)}
.drop-icon{font-size:28px;opacity:.2;margin-bottom:8px}
.drop-text{font-size:13px;color:var(--text2);font-weight:500}
.drop-sub{font-size:11px;color:var(--text3);margin-top:3px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:14px}
.photo-card{display:flex;flex-direction:column;gap:4px}
.photo-wrap{aspect-ratio:4/3;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative;cursor:pointer;box-shadow:var(--shadow)}
.photo-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .2s}
.photo-wrap:hover img{transform:scale(1.04)}
.photo-ov{position:absolute;inset:0;background:rgba(23,24,59,0.55);display:none;align-items:center;justify-content:center;gap:6px}
.photo-wrap:hover .photo-ov{display:flex}
.pbtn{border:none;border-radius:4px;color:#fff;cursor:pointer;padding:4px 9px;font-size:11px;font-family:var(--font);font-weight:500}
.pbtn.preview{background:rgba(23,24,59,0.85)}
.pbtn.del{background:rgba(175,1,41,0.85)}
.photo-label{font-size:10px;color:var(--text3);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.pdf-item{display:flex;align-items:center;gap:9px;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px}
.pdf-name{font-size:13px;flex:1;font-weight:500}
.pdf-meta{font-size:11px;color:var(--text3)}
.lightbox{position:fixed;inset:0;background:rgba(10,10,20,0.88);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(8px);cursor:pointer}
.lightbox img{max-width:90vw;max-height:88vh;border-radius:10px;box-shadow:0 8px 48px rgba(0,0,0,0.5);cursor:default}
.lb-close{position:absolute;top:20px;right:24px;background:rgba(255,255,255,0.14);border:none;border-radius:50%;width:36px;height:36px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-close:hover{background:rgba(255,255,255,0.24)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.form-input{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 10px;color:var(--navy);font-family:var(--font);font-size:13px;outline:none;transition:all .2s}
.form-input:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-bg)}
.form-input::placeholder{color:var(--text3)}
textarea.form-input{resize:vertical;min-height:80px;line-height:1.6}
input[type=color]{width:100%;height:38px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);cursor:pointer;padding:3px}
.modal-overlay{position:fixed;inset:0;background:rgba(23,24,59,0.42);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(5px)}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:12px;width:480px;max-height:88vh;overflow-y:auto;padding:22px;box-shadow:var(--shadow-md)}
.modal-title{font-size:16px;font-weight:700;margin-bottom:18px;color:var(--navy)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);border-radius:var(--radius);padding:10px 16px;font-size:13px;color:#fff;box-shadow:var(--shadow-md);transform:translateY(60px);opacity:0;transition:all .3s;z-index:600;font-weight:500}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
.lo{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:700;gap:14px}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;text-align:center;color:var(--text3)}
.empty-icon{font-size:48px;opacity:.16}
.empty-title{font-size:16px;font-weight:600;color:var(--text2)}
.empty-sub{font-size:13px;max-width:240px;line-height:1.7}
</style>
</head>
<body>
<div class="lo" id="lo">
  <svg width="32" height="32" viewBox="0 0 100 100"><rect width="100" height="100" rx="12" fill="#17183B"/><path d="M18 26h64v9H18zM26 39h48v24H26zM30 67h40v9H30z" fill="#C9B27E"/></svg>
  <div class="spinner"></div>
  <div style="font-size:12px;color:var(--text3);font-weight:500">Connecting...</div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="sb-head">
      <div class="logo">
        <svg width="30" height="30" viewBox="0 0 100 100"><rect width="100" height="100" rx="10" fill="rgba(201,178,126,0.14)"/><path d="M18 26h64v9H18zM26 39h48v24H26zM30 67h40v9H30z" fill="#C9B27E"/></svg>
        <div><div class="logo-text">United Seat Factory</div><div class="logo-sub">Pattern Database</div></div>
      </div>
      <div class="sb-search">
        <span class="sb-si">⌕</span>
        <input type="text" placeholder="Search patterns..." oninput="filterSB(this.value)">
      </div>
    </div>
    <div class="brand-list" id="brand-list"></div>
    <div class="sb-foot"><button class="btn-add-sb" onclick="openAddModal()">+ Add Pattern</button></div>
  </div>

  <div class="main">
    <div class="main-head">
      <div class="bc" id="bc"><span>Select a pattern</span></div>
      <div class="head-actions" id="ha" style="display:none">
        <span class="hst" id="hst"></span>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete()">Delete</button>
        <button class="btn btn-navy btn-sm" id="save-btn" onclick="saveAll()">Save</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="empty"><div class="empty-icon">🪑</div><div class="empty-title">No pattern selected</div><div class="empty-sub">Choose from the sidebar or add a new one.</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="add-modal" style="display:none" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <div class="modal-title">Add new pattern</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Car Brand *</label><input class="form-input" id="nm-brand" placeholder="e.g. Ford, Lexus..." list="brand-dl"><datalist id="brand-dl"></datalist></div>
      <div class="form-group"><label class="form-label">Model *</label><input class="form-input" id="nm-model" placeholder="e.g. Mustang, RX330..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Year Range *</label><input class="form-input" id="nm-years" placeholder="e.g. 2004-2009"></div>
      <div class="form-group"><label class="form-label">Trim / Version</label><input class="form-input" id="nm-trim" placeholder="e.g. GT, Base..."></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-navy" id="add-btn" onclick="addPattern()">Add Pattern</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="color-modal" style="display:none" onclick="if(event.target===this)closeColorModal()">
  <div class="modal">
    <div class="modal-title">Add color</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Color Name *</label><input class="form-input" id="c-name" placeholder="e.g. Black, Tan, Ivory..."></div>
      <div class="form-group"><label class="form-label">Trim Code</label><input class="form-input" id="c-code" placeholder="e.g. LA00, FE1..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Approximate color</label><input type="color" id="c-hex" value="#2c2c2c"></div>
      <div class="form-group"><label class="form-label">Year note</label><input class="form-input" id="c-years" placeholder="All years (default)"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeColorModal()">Cancel</button>
      <button class="btn btn-navy" onclick="addColor()">Add Color</button>
    </div>
  </div>
</div>

async function addColor(){

  const code=document.getElementById('c-code').value.trim();const hex=document.getElementById('c-hex').value;const year_note=document.getElementById('c-years').value.trim();

// FILE HANDLING
function tFile(type,id){fileCtx={type,id};const fi=document.getElementById('file-input');fi.accept='image/*';fi.multiple=(type==='product'||type==='before_after');fi.click();}
function oDO(e,id){e.preventDefault();document.getElementById(id)?.classList.add('dragover');}
function oDL(id){document.getElementById(id)?.classList.remove('dragover');}
function oDrop(e,type){e.preventDefault();document.getElementById('dz-'+type)?.classList.remove('dragover');const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));if(files.length){fileCtx={type,id:null};doFiles(files);}}
function handleFileInput(e){const files=Array.from(e.target.files);e.target.value='';if(files.length)doFiles(files);}
async function doFiles(files){
  if(!fileCtx)return;const{type,id}=fileCtx;
  if(type==='research'){
    const r=new FileReader();r.onload=ev=>{const ed=document.getElementById('rich-editor');if(ed){ed.focus();document.execCommand('insertImage',false,ev.target.result);dirty();}};r.readAsDataURL(files[0]);return;
  }
  if(type==='pos'||type==='other'||type==='color'){
    const r=new FileReader();r.onload=async ev=>{
      const url=ev.target.result;const p=getP();
      if(type==='pos'){p.positions[id+'_thumb']=url;await supa.from('patterns').update({positions:p.positions,updated_at:new Date().toISOString()}).eq('id',p.id);}
      else if(type==='other'){const i=parseInt(id);if(p.others[i])p.others[i].thumb=url;dirty();}
      else if(type==='color'){const c=p.colors.find(x=>x.id===id);if(c){c.thumb_url=url;await supa.from('pattern_colors').update({thumb_url:url}).eq('id',id);}}
      render();toast('Photo saved ✓');
    };r.readAsDataURL(files[0]);return;
  }
  const p=getP();toast('Uploading...','');
  for(const file of files){await new Promise(res=>{const r=new FileReader();r.onload=async ev=>{const url=ev.target.result;const caption=file.name.replace(/\.[^.]+$/,'');const{data,err}=await supa.from('pattern_photos').insert({pattern_id:p.id,url,type,caption}).select().single();if(!err&&data)p.photos.push(data);res();};r.readAsDataURL(file);});}
  render();toast(files.length+' photo(s) added ✓');
}
async function rmPhoto(id){if(!confirm('Remove?'))return;const p=getP();await supa.from('pattern_photos').delete().eq('id',id);p.photos=p.photos.filter(ph=>ph.id!==id);render();toast('Removed');}

function handlePaste(e){for(const item of e.clipboardData.items){if(item.type.startsWith('image/')){e.preventDefault();const r=new FileReader();r.onload=ev=>{document.execCommand('insertImage',false,ev.target.result);dirty();};r.readAsDataURL(item.getAsFile());return;}}}
function fmt(cmd){document.execCommand(cmd,false,null);document.getElementById('rich-editor')?.focus();dirty();}

// PDFS
function openPdfInput(){const name=prompt('PDF name:');if(!name)return;const url=prompt('Google Drive / Dropbox link (optional):');savePdf(name.trim(),url?url.trim():null);}
async function savePdf(name,url){const p=getP();const{data,error}=await supa.from('pattern_pdfs').insert({pattern_id:p.id,name,url}).select().single();if(error){toast('Error: '+error.message,'err');return;}p.pdfs.push(data);buildSB();render();toast('PDF added ✓');}
async function rmPdf(id){if(!confirm('Remove?'))return;const p=getP();await supa.from('pattern_pdfs').delete().eq('id',id);p.pdfs=p.pdfs.filter(f=>f.id!==id);buildSB();render();toast('Removed');}

// SAVE ALL
async function saveAll(){
  if(saving)return;collectText();const p=getP();if(!p)return;
  saving=true;setH('Saving...','saving');const btn=document.getElementById('save-btn');if(btn)btn.disabled=true;
  const{error}=await supa.from('patterns').update({research:p.research,notes:p.notes,submodels:p.submodels,others:p.others,updated_at:new Date().toISOString()}).eq('id',p.id);
  saving=false;if(btn)btn.disabled=false;
  if(error){toast('Save failed: '+error.message,'err');setH('Save failed');return;}
  unsaved=false;setH('Saved ✓','saved');buildSB();toast('Saved ✓');
}

// ADD PATTERN
function openAddModal(){document.getElementById('add-modal').style.display='flex';}
function closeAddModal(){document.getElementById('add-modal').style.display='none';}
async function addPattern(){
  const brand=document.getElementById('nm-brand').value.trim();const model=document.getElementById('nm-model').value.trim();const years=document.getElementById('nm-years').value.trim();const trim=document.getElementById('nm-trim').value.trim();
  if(!brand||!model||!years){alert('Brand, Model and Years required.');return;}
  const btn=document.getElementById('add-btn');btn.disabled=true;btn.textContent='Adding...';
  const defPos={front_bottom:false,front_top:false,rear_bottom:false,rear_top:false};
  const{data,error}=await supa.from('patterns').insert({brand,model,years,trim,research:'',notes:'',submodels:[],materials:[],positions:defPos,others:[]}).select().single();
  btn.disabled=false;btn.textContent='Add Pattern';
  if(error){toast('Error: '+error.message,'err');return;}
  const full={...data,colors:[],pdfs:[],photos:[],submodels:[],materials:[],positions:defPos,others:[]};
  patterns.push(full);patterns.sort((a,b)=>a.brand.localeCompare(b.brand)||a.model.localeCompare(b.model));
  updateBrandDl();closeAddModal();['nm-brand','nm-model','nm-years','nm-trim'].forEach(id=>document.getElementById(id).value='');
  selP(data.id);toast('Pattern added ✓');
}

// DELETE
async function confirmDelete(){
  const p=getP();if(!confirm(`Delete "${p.years} ${p.brand} ${p.model}"?\n\nAll data will be permanently deleted.`))return;
  await supa.from('patterns').delete().eq('id',p.id);
  patterns=patterns.filter(x=>x.id!==p.id);currentId=null;buildSB();
  document.getElementById('content').innerHTML='<div class="empty"><div class="empty-icon">🪑</div><div class="empty-title">Pattern deleted</div></div>';
  document.getElementById('ha').style.display='none';document.getElementById('bc').innerHTML='<span>Select a pattern</span>';
  toast('Deleted');
}

// LIGHTBOX
function openLB(url){document.getElementById('lb-img').src=url;document.getElementById('lb').style.display='flex';}
function closeLB(){document.getElementById('lb').style.display='none';document.getElementById('lb-img').src='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB();});

// TOAST
function toast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className='toast '+type;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2600);}

init();
</script>
