<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USF Pattern Database</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#17183B;--navy2:#1f2048;
  --navy-light:rgba(23,24,59,0.06);--navy-lighter:rgba(23,24,59,0.03);
  --gold:#C9B27E;--gold2:#b89d68;--gold-bg:rgba(201,178,126,0.1);--gold-border:rgba(201,178,126,0.3);
  --red:#AF0129;--red-bg:rgba(175,1,41,0.06);--red-border:rgba(175,1,41,0.2);
  --bg:#ffffff;--bg2:#f8f7f5;--bg3:#f1eeea;
  --border:#e5e0d8;--border2:#d0c9be;
  --text2:rgba(23,24,59,0.6);--text3:rgba(23,24,59,0.4);
  --green:#1a6e42;
  --sb-bg:#eef0f6;--sb-border:#dde0ec;
  --radius:8px;--font:'DM Sans',sans-serif;
  --shadow:0 1px 3px rgba(23,24,59,0.07);--shadow-md:0 4px 16px rgba(23,24,59,0.11);
  --thumb:90px;
}
body{font-family:var(--font);background:var(--bg);color:var(--navy);min-height:100vh;font-size:15px;line-height:1.55}
.app{display:grid;grid-template-columns:264px 1fr;height:100vh;overflow:hidden}
.sidebar{background:var(--sb-bg);border-right:1px solid var(--sb-border);display:flex;flex-direction:column;overflow:hidden}
.sb-hdr{padding:18px 16px 14px;border-bottom:1px solid var(--sb-border);flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:13px}
.logo-text{font-size:13px;font-weight:700;color:var(--navy);line-height:1.2}
.logo-sub{font-size:10px;color:rgba(23,24,59,0.38);letter-spacing:0.07em;text-transform:uppercase;margin-top:1px}
.sw{position:relative}
.sw input{width:100%;background:rgba(23,24,59,0.05);border:1px solid var(--sb-border);border-radius:var(--radius);padding:8px 10px 8px 30px;color:var(--navy);font-family:var(--font);font-size:13px;outline:none;transition:all 0.2s}
.sw input:focus{background:#fff;border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-bg)}
.sw input::placeholder{color:rgba(23,24,59,0.35)}
.sw-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:rgba(23,24,59,0.35);pointer-events:none}
.brand-list{flex:1;overflow-y:auto;padding:6px 0}
.brand-list::-webkit-scrollbar{width:3px}
.brand-list::-webkit-scrollbar-thumb{background:var(--sb-border);border-radius:2px}
.brand-hdr{display:flex;align-items:center;gap:7px;padding:7px 14px;cursor:pointer;user-select:none;transition:background 0.12s}
.brand-hdr:hover{background:rgba(23,24,59,0.04)}
.brand-hdr.open{background:rgba(23,24,59,0.07)}
.bc{font-size:9px;color:rgba(23,24,59,0.32);transition:transform 0.18s;flex-shrink:0}
.bc.open{transform:rotate(90deg);color:var(--navy)}
.bn{font-size:13px;font-weight:600;color:var(--navy);flex:1}
.bct{font-size:10px;color:rgba(23,24,59,0.35);background:rgba(23,24,59,0.06);padding:1px 6px;border-radius:10px;font-weight:600}
.pl{display:none;padding-bottom:4px}
.pl.open{display:block}
.pi{padding:6px 14px 6px 30px;cursor:pointer;font-size:13px;color:rgba(23,24,59,0.55);transition:all 0.12s;border-left:2.5px solid transparent}
.pi:hover{color:var(--navy);background:rgba(23,24,59,0.04)}
.pi.active{color:var(--navy);border-left-color:var(--navy);background:rgba(23,24,59,0.07);font-weight:500}
.sb-foot{padding:12px 16px;border-top:1px solid var(--sb-border);flex-shrink:0}
.btn-add-pat{width:100%;background:var(--navy);color:#fff;border:none;border-radius:var(--radius);padding:10px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:background 0.15s}
.btn-add-pat:hover{background:var(--navy2)}
.main{display:flex;flex-direction:column;overflow:hidden}
.main-hdr{padding:0 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;min-height:54px;flex-shrink:0;gap:12px}
.breadcrumb{font-size:13px;color:var(--text3);display:flex;align-items:center;gap:5px}
.bcs{color:var(--border2)}
.hdr-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.hdr-status{font-size:13px;color:var(--text3)}
.hdr-status.saved{color:var(--green)}
.hdr-status.saving{color:var(--gold2)}
.content{flex:1;overflow-y:auto;padding:24px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.btn{padding:7px 16px;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--navy)}
.btn-navy{background:var(--navy);color:#fff}
.btn-navy:hover{background:var(--navy2)}
.btn-danger{background:transparent;border:1px solid var(--red-border);color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:5px 13px;font-size:13px}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-ico{background:transparent;border:none;cursor:pointer;color:var(--text3);padding:4px 7px;border-radius:4px;transition:all 0.15s;font-size:15px;line-height:1}
.btn-ico:hover{background:var(--red-bg);color:var(--red)}
.pat-hdr{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.pat-title-block{flex:1}
.pat-title{font-size:21px;font-weight:700;color:var(--navy);letter-spacing:-0.02em;line-height:1.25}
.pat-edit-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.pef{display:flex;flex-direction:column;gap:3px}
.pef-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.pef-input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:var(--font);font-size:14px;color:var(--navy);outline:none;width:150px;transition:all 0.2s}
.pef-input:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-bg)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:22px}
.tab{padding:10px 18px;font-size:14px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--navy);border-bottom-color:var(--gold)}
.sec{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.sec-hdr{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--bg2)}
.sec-title{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:0.06em}
.sec-body{padding:16px}
.info-grid{display:grid;grid-template-columns:3fr 2fr;gap:16px}
@media(max-width:860px){.info-grid{grid-template-columns:1fr}}
.var-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid var(--border);transition:background 0.15s}
.var-row:last-of-type{border-bottom:none}
.var-row.dragover{background:var(--gold-bg);outline:2px dashed var(--gold);outline-offset:-2px}
.var-row-label{font-size:14px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;width:44px;flex-shrink:0}
.var-btns{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.var-btn{padding:9px 22px;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);transition:all 0.15s;user-select:none}
.var-btn:hover{border-color:var(--navy);color:var(--navy)}
.var-btn.on{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(23,24,59,0.25)}
.var-drop-hint{display:none}
.var-photo-placeholder{position:relative;width:52px;height:52px;border-radius:8px;flex-shrink:0;cursor:pointer;background:var(--bg3);border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;transition:all 0.15s;overflow:hidden}
.var-photo-placeholder:hover{border-color:var(--gold);background:var(--gold-bg)}
.var-photo-placeholder-ico{font-size:16px;opacity:0.22}
.var-photo-placeholder-hov{position:absolute;inset:0;background:rgba(23,24,59,0.45);display:none;align-items:center;justify-content:center;font-size:12px;color:#fff}
.var-photo-placeholder:hover .var-photo-placeholder-hov{display:flex}
.var-photo{position:relative;width:var(--thumb);height:var(--thumb);border-radius:8px;overflow:hidden;flex-shrink:0;cursor:pointer;box-shadow:var(--shadow)}
.var-photo img{width:100%;height:100%;object-fit:cover;display:block}
.var-photo-x{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(175,1,41,0.85);border:none;border-radius:50%;color:#fff;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700;z-index:2}
.var-photo-x:hover{background:var(--red)}
.var-photo:hover .var-photo-x{display:flex}
.other-var-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background 0.15s}
.other-var-row:last-of-type{border-bottom:none}
.other-var-row.dragover{background:var(--gold-bg);outline:2px dashed var(--gold);outline-offset:-2px}
.other-var-toggle{width:40px;height:24px;border-radius:12px;background:var(--border2);border:none;cursor:pointer;position:relative;flex-shrink:0;transition:background 0.2s}
.other-var-toggle.on{background:var(--navy)}
.other-var-toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left 0.18s;box-shadow:0 1px 2px rgba(0,0,0,0.18)}
.other-var-toggle.on::after{left:19px}
.other-var-input{flex:1;background:transparent;border:none;outline:none;font-family:var(--font);font-size:14px;color:var(--navy);font-weight:500}
.other-var-input::placeholder{color:var(--text3)}
.other-var-photo{position:relative;width:var(--thumb);height:var(--thumb);border-radius:8px;overflow:hidden;flex-shrink:0;cursor:pointer;box-shadow:var(--shadow)}
.other-var-photo img{width:100%;height:100%;object-fit:cover;display:block}
.other-var-photo-x{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(175,1,41,0.85);border:none;border-radius:50%;color:#fff;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700}
.other-var-photo:hover .other-var-photo-x{display:flex}
.btn-add-other{background:transparent;border:1.5px dashed var(--border2);border-radius:var(--radius);padding:9px;font-family:var(--font);font-size:13px;color:var(--text3);cursor:pointer;transition:all 0.15s;width:calc(100% - 32px);margin:10px 16px;text-align:center;display:block}
.btn-add-other:hover{border-color:var(--navy);color:var(--navy);background:rgba(23,24,59,0.04)}
.toggle-group{display:flex;gap:8px;flex-wrap:wrap}
.tog-btn{padding:9px 18px;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);transition:all 0.15s}
.tog-btn:hover{border-color:var(--navy);color:var(--navy)}
.tog-btn.on{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(23,24,59,0.22)}
.color-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background 0.12s}
.color-row:last-child{border-bottom:none}
.color-row.dragover{background:var(--gold-bg);outline:2px dashed var(--gold);outline-offset:-2px}
.color-row:hover{background:var(--navy-lighter)}
.color-swatch{width:28px;height:28px;border-radius:5px;border:1px solid var(--border);flex-shrink:0;box-shadow:var(--shadow)}
.color-name{font-size:14px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.color-code{font-size:13px;color:var(--navy);background:var(--bg3);padding:3px 8px;border-radius:4px;border:1px solid var(--border);white-space:nowrap}
.color-years{font-size:13px;color:var(--text2);white-space:nowrap;min-width:80px}
.color-photo{position:relative;width:52px;height:52px;border-radius:8px;overflow:hidden;flex-shrink:0;cursor:pointer;background:var(--bg3);border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:border-color 0.15s}
.color-photo:hover{border-color:var(--gold)}
.color-photo.filled{width:var(--thumb);height:var(--thumb);border-style:solid;border-color:var(--border)}
.color-photo img{width:100%;height:100%;object-fit:cover;display:block}
.color-photo-ico{font-size:16px;opacity:0.22}
.color-photo-hov{position:absolute;inset:0;background:rgba(23,24,59,0.45);display:none;align-items:center;justify-content:center;font-size:12px;color:#fff;text-align:center}
.color-photo:hover .color-photo-hov{display:flex}
.color-photo-x{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(175,1,41,0.85);border:none;border-radius:50%;color:#fff;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700;z-index:2}
.color-photo-x:hover{background:var(--red)}
.color-photo:hover .color-photo-x{display:flex}
.sub-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border)}
.sub-row:last-child{border-bottom:none}
.sub-name{flex:1;background:transparent;border:none;outline:none;font-family:var(--font);font-size:14px;color:var(--navy);font-weight:500}
.sub-name::placeholder{color:var(--text3)}
.sub-years{width:110px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:5px 8px;font-family:var(--font);font-size:13px;color:var(--text2);outline:none}
.sub-years:focus{border-color:var(--gold-border)}
.notes-textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;color:var(--navy);font-family:var(--font);font-size:14px;resize:vertical;min-height:80px;outline:none;line-height:1.6;transition:all 0.2s}
.notes-textarea:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-bg)}
.rich-toolbar{display:flex;gap:3px;padding:8px 10px;border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;background:var(--bg2);flex-wrap:wrap;align-items:center}
.rich-btn{background:transparent;border:1px solid transparent;border-radius:4px;padding:4px 9px;cursor:pointer;font-size:13px;font-family:var(--font);color:var(--text2);transition:all 0.15s;line-height:1.4}
.rich-btn:hover{background:var(--bg3);border-color:var(--border);color:var(--navy)}
.rich-btn.hl{background:#FFF176;color:#5a4a00;border-color:#e6d94a;font-weight:600}
.rich-sep{width:1px;background:var(--border);margin:0 3px;align-self:stretch}
.rich-editor{border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);padding:16px;min-height:220px;outline:none;font-family:var(--font);font-size:14px;line-height:1.75;color:var(--navy)}
.rich-editor:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-bg)}
.rich-editor img{border-radius:5px;margin:6px 0;border:1px solid var(--border);max-width:100%;cursor:se-resize}
.rich-editor img.img-sel{outline:2.5px solid var(--gold);outline-offset:2px}
.rich-editor p{margin-bottom:6px}
.photo-drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg2)}
.photo-drop-zone:hover,.photo-drop-zone.dragover{border-color:var(--gold);background:var(--gold-bg)}
.drop-ico{font-size:32px;opacity:0.2;margin-bottom:10px}
.drop-txt{font-size:14px;color:var(--text2);font-weight:500}
.drop-sub{font-size:12px;color:var(--text3);margin-top:4px}
.sq-photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-top:16px}
.sq-photo-card{display:flex;flex-direction:column;gap:5px}
.sq-photo-wrap{width:100%;aspect-ratio:1/1;position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer;background:var(--bg3);border:1px solid var(--border);box-shadow:var(--shadow)}
.sq-photo-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.sq-photo-overlay{position:absolute;inset:0;background:rgba(23,24,59,0.48);display:none;align-items:center;justify-content:center}
.sq-photo-wrap:hover .sq-photo-overlay{display:flex}
.sq-photo-view-btn{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.35);border-radius:5px;color:#fff;cursor:pointer;padding:6px 12px;font-size:13px;font-family:var(--font)}
.sq-photo-view-btn:hover{background:rgba(255,255,255,0.28)}
.sq-photo-x{position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(175,1,41,0.85);border:none;border-radius:50%;color:#fff;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700;z-index:2}
.sq-photo-x:hover{background:var(--red)}
.sq-photo-wrap:hover .sq-photo-x{display:flex}
.sq-photo-label{font-size:12px;color:var(--text3);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pdf-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:7px}
.pdf-name{font-size:14px;flex:1;font-weight:500}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.form-input{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:9px 12px;color:var(--navy);font-family:var(--font);font-size:14px;outline:none;transition:all 0.2s}
.form-input:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-bg)}
.form-input::placeholder{color:var(--text3)}
input[type=color]{width:100%;height:40px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);cursor:pointer;padding:3px}
.modal-overlay{position:fixed;inset:0;background:rgba(23,24,59,0.38);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px)}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:12px;width:480px;max-height:88vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow-md)}
.modal-title{font-size:18px;font-weight:600;margin-bottom:18px;color:var(--navy)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;display:flex;align-items:center;justify-content:center}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain}
.lb-close{position:absolute;top:18px;right:20px;color:#fff;background:rgba(255,255,255,0.1);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;font-family:var(--font)}
.lb-close:hover{background:rgba(255,255,255,0.2)}
.confirm-overlay{position:fixed;inset:0;background:rgba(23,24,59,0.38);display:flex;align-items:center;justify-content:center;z-index:250;backdrop-filter:blur(4px)}
.confirm-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:24px;width:360px;box-shadow:var(--shadow-md)}
.confirm-title{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--navy)}
.confirm-msg{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.confirm-actions{display:flex;gap:8px;justify-content:flex-end}
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);border-radius:var(--radius);padding:11px 18px;font-size:14px;color:#fff;box-shadow:var(--shadow-md);transform:translateY(60px);opacity:0;transition:all 0.3s;z-index:400;font-weight:500}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:500;gap:14px}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:14px;text-align:center}
.empty-ico{font-size:52px;opacity:0.15}
.empty-title{font-size:17px;font-weight:600;color:var(--text2)}
.empty-sub{font-size:14px;max-width:250px;line-height:1.7}
</style>
</head>
<body>
<div class="loading-overlay" id="loading-overlay">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
    <svg width="28" height="28" viewBox="0 0 100 100"><rect width="100" height="100" rx="12" fill="#17183B"/><path d="M20 28h60v8H20zM28 40h44v22H28zM32 66h36v8H32z" fill="#C9B27E"/></svg>
    <span style="font-size:15px;font-weight:700;color:var(--navy)">United Seat Factory</span>
  </div>
  <div class="spin"></div>
  <div style="font-size:13px;color:var(--text3)">Connecting to database...</div>
</div>
<div class="app">
  <div class="sidebar">
    <div class="sb-hdr">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 100 100"><rect width="100" height="100" rx="10" fill="rgba(23,24,59,0.1)"/><path d="M18 26h64v9H18zM26 39h48v24H26zM30 67h40v9H30z" fill="#17183B"/></svg>
        <div><div class="logo-text">United Seat Factory</div><div class="logo-sub">Pattern Database</div></div>
      </div>
      <div class="sw"><span class="sw-ico">⌕</span><input type="text" placeholder="Search patterns..." oninput="filterSidebar(this.value)"></div>
    </div>
    <div class="brand-list" id="brand-list"><div style="padding:20px;color:rgba(23,24,59,0.35);font-size:13px;text-align:center">Loading...</div></div>
    <div class="sb-foot"><button class="btn-add-pat" onclick="openAddModal()">+ Add Pattern</button></div>
  </div>
  <div class="main">
    <div class="main-hdr">
      <div class="breadcrumb" id="breadcrumb"><span>Select a pattern</span></div>
      <div class="hdr-actions" id="hdr-actions" style="display:none">
        <span class="hdr-status" id="hdr-status"></span>
        <button class="btn btn-ghost btn-sm" onclick="undo()" title="Undo (Cmd+Z)">↩ Undo</button>
        <button class="btn btn-ghost btn-sm" onclick="redo()" title="Redo (Cmd+Shift+Z)">↪ Redo</button>
        <button class="btn btn-danger btn-sm" onclick="confirmAction('Delete this pattern and all its data? This cannot be undone.',doDelete)">Delete</button>
        <button class="btn btn-navy btn-sm" onclick="saveAll()">Save changes</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="empty-state"><div class="empty-ico">🪑</div><div class="empty-title">No pattern selected</div><div class="empty-sub">Choose a pattern from the sidebar or add a new one.</div></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="add-modal" style="display:none" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <div class="modal-title">Add new pattern</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Car Brand *</label><input class="form-input" id="nm-brand" placeholder="e.g. Ford, Lexus..." list="brand-dl"><datalist id="brand-dl"></datalist></div>
      <div class="form-group"><label class="form-label">Model *</label><input class="form-input" id="nm-model" placeholder="e.g. Mustang, RX330..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Year Range *</label><input class="form-input" id="nm-years" placeholder="e.g. 2004-2009"></div>
      <div class="form-group"><label class="form-label">Trim / Version</label><input class="form-input" id="nm-trim" placeholder="e.g. GT, Base, V6..."></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-navy" id="add-confirm-btn" onclick="addPattern()">Add Pattern</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="color-modal" style="display:none" onclick="if(event.target===this)closeColorModal()">
  <div class="modal">
    <div class="modal-title">Add color</div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Color Name *</label><input class="form-input" id="c-name" placeholder="e.g. Black, Tan, Ivory..."></div>
      <div class="form-group"><label class="form-label">Trim Code</label><input class="form-input" id="c-code" placeholder="e.g. LA00, FE1..."></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Approximate color</label><input type="color" id="c-hex" value="#2c2c2c"></div>
      <div class="form-group"><label class="form-label">Year note</label><input class="form-input" id="c-years" placeholder="All years"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeColorModal()">Cancel</button>
      <button class="btn btn-navy" onclick="addColor()">Add Color</button>
    </div>
  </div>
</div>
<div class="lightbox" id="lightbox" style="display:none" onclick="closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">&#x2715;</button>
  <img id="lb-img" src="" alt="">
</div>
<div class="confirm-overlay" id="confirm-overlay" style="display:none">
  <div class="confirm-box">
    <div class="confirm-title" id="confirm-title">Are you sure?</div>
    <div class="confirm-msg" id="confirm-msg"></div>
    <div class="confirm-actions">
      <button class="btn btn-ghost btn-sm" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger btn-sm" id="confirm-ok-btn">Confirm</button>
    </div>
  </div>
</div>
<input type="file" id="photo-file" style="display:none" accept="image/*" multiple onchange="handlePhotoFiles(event)">
<input type="file" id="research-img-file" style="display:none" accept="image/*" onchange="handleResearchImg(event)">
<div class="toast" id="toast"></div>
<script>
const SUPA_URL='https://doommgfawoqiptgqadwd.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvb21tZ2Zhd29xaXB0Z3FhZHdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyODgzNTEsImV4cCI6MjA5MDg2NDM1MX0.EAUUhtPoGlqDQSLlABMwc5DptBI7T5HCkqCS-zW8kaQ';
const {createClient}=supabase;
const supa=createClient(SUPA_URL,SUPA_KEY);
const MATERIALS=['Vinyl','Vinyl Perf','Leather','Leather Perf','Cloth','Alcantara','Other'];
const VAR_GROUPS=[
  {id:'front',label:'Front',btns:[{id:'front_bottom',label:'Bottoms'},{id:'front_top',label:'Tops'}]},
  {id:'rear',label:'Rear',btns:[{id:'rear_bottom',label:'Bottoms'},{id:'rear_top',label:'Tops'}]},
];
let patterns=[],currentId=null,activeTab='info',unsaved=false,photoUploadType='product';
function confirmAction(msg,cb,title){
  title=title||'Are you sure?';
  document.getElementById('confirm-title').textContent=title;
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-overlay').style.display='flex';
  document.getElementById('confirm-ok-btn').onclick=function(){closeConfirm();cb();};
}
function closeConfirm(){document.getElementById('confirm-overlay').style.display='none';}
async function init(){
  const r=await supa.from('patterns').select('id').limit(1);
  if(r.error&&r.error.code==='42P01'){showSql();return;}
  await loadAll();
  document.getElementById('loading-overlay').style.display='none';
}
function showSql(){
  document.getElementById('loading-overlay').innerHTML='<div style="text-align:center;max-width:520px;padding:24px"><div style="font-size:15px;font-weight:600;margin-bottom:12px">Database setup needed</div><textarea readonly style="width:100%;height:200px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:monospace;font-size:11px;resize:none;color:var(--navy)">'+getSql()+'</textarea><button onclick="location.reload()" style="margin-top:14px;background:var(--navy);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer">Reload after running SQL</button></div>';
}
function getSql(){return'CREATE TABLE IF NOT EXISTS patterns (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, brand text NOT NULL, model text NOT NULL, years text NOT NULL, trim text, research text DEFAULT \'\', notes text DEFAULT \'\', submodels jsonb DEFAULT \'[]\', materials jsonb DEFAULT \'[]\', positions jsonb DEFAULT \'{}\', other_positions jsonb DEFAULT \'[]\', created_at timestamptz DEFAULT now(), updated_at timestamptz DEFAULT now());\nCREATE TABLE IF NOT EXISTS pattern_colors (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, pattern_id uuid REFERENCES patterns(id) ON DELETE CASCADE, name text NOT NULL, code text, hex text DEFAULT \'#888888\', year_note text, thumb_url text, sort_order int DEFAULT 0, created_at timestamptz DEFAULT now());\nCREATE TABLE IF NOT EXISTS pattern_pdfs (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, pattern_id uuid REFERENCES patterns(id) ON DELETE CASCADE, name text NOT NULL, url text, size_label text, created_at timestamptz DEFAULT now());\nCREATE TABLE IF NOT EXISTS pattern_photos (id uuid DEFAULT gen_random_uuid() PRIMARY KEY, pattern_id uuid REFERENCES patterns(id) ON DELETE CASCADE, url text NOT NULL, type text DEFAULT \'product\', caption text, created_at timestamptz DEFAULT now());\nALTER TABLE patterns ADD COLUMN IF NOT EXISTS other_positions jsonb DEFAULT \'[]\';\nALTER TABLE pattern_colors ADD COLUMN IF NOT EXISTS thumb_url text;';}
async function loadAll(){
  const {data:pats}=await supa.from('patterns').select('*').order('brand').order('model').order('years');
  const {data:colors}=await supa.from('pattern_colors').select('*').order('sort_order');
  const {data:pdfs}=await supa.from('pattern_pdfs').select('*').order('created_at');
  const {data:photos}=await supa.from('pattern_photos').select('*').order('created_at');
  patterns=(pats||[]).map(function(p){return Object.assign({},p,{submodels:p.submodels||[],materials:p.materials||[],positions:p.positions||{},other_positions:p.other_positions||[],colors:(colors||[]).filter(function(c){return c.pattern_id===p.id;}),pdfs:(pdfs||[]).filter(function(f){return f.pattern_id===p.id;}),photos:(photos||[]).filter(function(ph){return ph.pattern_id===p.id;})});});
  buildSidebar();
  document.getElementById('brand-dl').innerHTML=[...new Set(patterns.map(function(p){return p.brand;}))].sort().map(function(b){return '<option value="'+b+'">';}).join('');
}
var sbFilter='';
function filterSidebar(v){sbFilter=v.toLowerCase();buildSidebar();}
function buildSidebar(){
  var grouped={};
  patterns.forEach(function(p){
    if(!grouped[p.brand])grouped[p.brand]=[];
    var q=sbFilter;
    if(!q||p.brand.toLowerCase().includes(q)||p.model.toLowerCase().includes(q)||p.years.includes(q)||(p.trim||'').toLowerCase().includes(q))grouped[p.brand].push(p);
  });
  var html='';
  Object.keys(grouped).sort().forEach(function(brand){
    var list=grouped[brand];if(!list.length)return;
    var isOpen=list.some(function(p){return p.id===currentId;})||!!sbFilter;
    var bid='bl-'+brand.replace(/[^a-z0-9]/gi,'_');
    html+='<div><div class="brand-hdr '+(isOpen?'open':'')+'" onclick="toggleBrand(this,\''+bid+'\')"><span class="bc '+(isOpen?'open':'')+'">&#9654;</span><span class="bn">'+brand+'</span><span class="bct">'+list.length+'</span></div><div class="pl '+(isOpen?'open':'')+'" id="'+bid+'">';
    list.forEach(function(p){html+='<div class="pi '+(p.id===currentId?'active':'')+'" onclick="selectPattern(\''+p.id+'\')">'+p.model+' '+p.years+(p.trim?' \xb7 '+p.trim:'')+'</div>';});
    html+='</div></div>';
  });
  document.getElementById('brand-list').innerHTML=html||'<div style="padding:16px;color:rgba(23,24,59,0.35);font-size:13px">No patterns found</div>';
}
function toggleBrand(el,id){var l=document.getElementById(id),c=el.querySelector('.bc');l.classList.toggle('open');c.classList.toggle('open');el.classList.toggle('open');}
function selectPattern(id){currentId=id;activeTab='info';unsaved=false;undoStack=[];redoStack=[];buildSidebar();renderPattern();document.getElementById('hdr-actions').style.display='flex';setStatus('');setTimeout(snapshot,100);}
function getP(){return patterns.find(function(p){return p.id===currentId;});}
function setStatus(m,c){c=c||'';var el=document.getElementById('hdr-status');if(el){el.textContent=m;el.className='hdr-status '+c;}}
function markDirty(){unsaved=true;setStatus('Unsaved changes');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function su(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function renderPattern(){
  var p=getP();if(!p)return;
  document.getElementById('breadcrumb').innerHTML='<span style="color:var(--text3)">'+p.brand+'</span><span class="bcs"> &rsaquo; </span><span style="font-weight:500">'+p.model+' '+p.years+(p.trim?' &middot; '+p.trim:'')+'</span>';
  var prod=(p.photos||[]).filter(function(ph){return ph.type==='product';});
  var ba=(p.photos||[]).filter(function(ph){return ph.type==='before_after';});
  var tabs=[{id:'info',label:'Info'},{id:'photos',label:'Photos ('+prod.length+')'},{id:'before_after',label:'Before & After ('+ba.length+')'},{id:'research',label:'Research'}];
  var html='<div class="pat-hdr"><div class="pat-title-block"><div class="pat-title" id="pat-title-display">'+esc(p.years)+' '+esc(p.brand)+' '+esc(p.model)+(p.trim?' '+esc(p.trim):'')+
    '</div><div class="pat-edit-row" id="pat-edit-row" style="display:none">'+
    '<div class="pef"><div class="pef-label">Years</div><input class="pef-input" id="edit-years" value="'+esc(p.years)+'" oninput="markDirty()"></div>'+
    '<div class="pef"><div class="pef-label">Brand</div><input class="pef-input" id="edit-brand" value="'+esc(p.brand)+'" list="brand-dl" oninput="markDirty()"></div>'+
    '<div class="pef"><div class="pef-label">Model</div><input class="pef-input" id="edit-model" value="'+esc(p.model)+'" oninput="markDirty()"></div>'+
    '<div class="pef"><div class="pef-label">Trim</div><input class="pef-input" id="edit-trim" value="'+esc(p.trim||'')+'" placeholder="e.g. GT, V6..." oninput="markDirty()"></div>'+
    '</div></div><button class="btn btn-ghost btn-sm" id="edit-toggle-btn" onclick="toggleEditMode()">&#9998; Edit</button></div>';
  html+='<div class="tabs">'+tabs.map(function(t){return '<div class="tab '+(activeTab===t.id?'active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+'</div>';}).join('')+'</div>';
  if(activeTab==='info'){
    html+='<div class="info-grid">';
    // Variations (top left)
    html+='<div class="sec"><div class="sec-hdr"><span class="sec-title">Variations</span></div>';
    VAR_GROUPS.forEach(function(g){
      var thumb=p.positions[g.id+'_thumb']||'';
      html+='<div class="var-row" id="varrow-'+g.id+'" ondragover="onVarOver(event,\''+g.id+'\')" ondragleave="onVarLeave(\''+g.id+'\')" ondrop="onVarDrop(event,\''+g.id+'\')">'+
        '<span class="var-row-label">'+g.label+'</span><div class="var-btns">'+
        g.btns.map(function(b){return '<button class="var-btn '+(p.positions[b.id]?'on':'')+'" onclick="toggleVarBtn(\''+b.id+'\',\''+g.id+'\')">'+b.label+'</button>';}).join('')+
        '</div>'+(thumb?'<div class="var-photo" onclick="openLB(\''+su(thumb)+'\',event)"><img src="'+thumb+'" alt=""><button class="var-photo-x" onclick="confirmAction(\'Remove photo?\',function(){removeGroupThumb(\''+g.id+'\')})">&#x2715;</button></div>':'<div class="var-photo-placeholder" onclick="document.getElementById(\'vp-file-'+g.id+'\').click()"><span class="var-photo-placeholder-ico">&#128247;</span><div class="var-photo-placeholder-hov">&#128247; drop or click</div></div><input type="file" id="vp-file-'+g.id+'" style="display:none" accept="image/*" onchange="handleVarPhotoFile(event,\''+g.id+'\')">')+
        '</div>';
    });
    (p.other_positions||[]).forEach(function(op,i){
      var thumb=op.thumb||'';
      html+='<div class="other-var-row" id="orow-'+i+'" ondragover="onOtherOver(event,'+i+')" ondragleave="onOtherLeave('+i+')" ondrop="onOtherDrop(event,'+i+')">'+
        '<button class="other-var-toggle '+(op.active?'on':'')+'" onclick="confirmAction(\'Toggle this variation?\',function(){toggleOtherVar('+i+')})"></button>'+
        '<input class="other-var-input" value="'+esc(op.label)+'" placeholder="e.g. Center console, Foam cushion..." oninput="updateOtherLabel('+i+',this.value)">'+
        (thumb?'<div class="other-var-photo" onclick="openLB(\''+su(thumb)+'\',event)"><img src="'+thumb+'" alt=""><button class="other-var-photo-x" onclick="confirmAction(\'Remove photo?\',function(){removeOtherThumb('+i+')})">&#x2715;</button></div>':'<div class="var-photo-placeholder" style="width:44px;height:44px" onclick="document.getElementById(\'ovp-file-'+i+'\').click()"><span class="var-photo-placeholder-ico" style="font-size:14px">&#128247;</span><div class="var-photo-placeholder-hov" style="font-size:11px">&#128247;</div></div><input type="file" id="ovp-file-'+i+'" style="display:none" accept="image/*" onchange="handleOtherVarPhotoFile(event,'+i+')">')+
        '<button class="btn-ico" onclick="confirmAction(\'Remove this variation?\',function(){removeOtherVar('+i+')})">&#x2715;</button></div>';
    });
    html+='<button class="btn-add-other" onclick="addOtherVar()">+ Add other variation</button></div>';
    // Materials (top right)
    var mats=p.materials||[];
    var stdMats=MATERIALS.slice(0,-1);
    var otherCustom=mats.find(function(m){return !stdMats.includes(m)&&m!=='Other';})||'';
    var hasOther=mats.includes('Other')||!!otherCustom;
    html+='<div class="sec"><div class="sec-hdr"><span class="sec-title">Materials</span></div><div class="sec-body">'+
      '<div class="toggle-group">'+
      stdMats.map(function(m){return '<button class="tog-btn '+(mats.includes(m)?'on':'')+'" onclick="toggleMaterial(\''+m+'\')">'+m+'</button>';}).join('')+
      '<button class="tog-btn '+(hasOther?'on':'')+'" onclick="toggleMaterial(\'Other\')">'+(otherCustom||'Other')+'</button>'+
      '</div>'+
      (hasOther?'<div style="margin-top:10px;display:flex;align-items:center;gap:8px"><span style="font-size:13px;color:var(--text2);white-space:nowrap">Specify:</span><input style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:var(--font);font-size:13px;color:var(--navy);outline:none" placeholder="e.g. Neoprene, Suede..." value="'+esc(otherCustom)+'" oninput="setOtherMaterial(this.value)"></div>':'')+
      '</div></div>';
    // Colors (bottom left)
    html+='<div class="sec"><div class="sec-hdr"><span class="sec-title">Colors</span><button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="openColorModal()">+ Add</button></div>';
    if(p.colors.length){
      p.colors.forEach(function(c){
        var thumb=c.thumb_url||'';
        html+='<div class="color-row" id="crow-'+c.id+'" ondragover="onColorOver(event,\''+c.id+'\')" ondragleave="onColorLeave(\''+c.id+'\')" ondrop="onColorDrop(event,\''+c.id+'\')">'+
          '<div class="color-swatch" style="background:'+(c.hex||'#888')+'"></div>'+
          '<span class="color-name">'+esc(c.name)+'</span>'+
          (c.code?'<span class="color-code">'+esc(c.code)+'</span>':'')+
          '<span class="color-years">'+esc(c.year_note||'All years')+'</span>'+
          '<div class="color-photo '+(thumb?'filled':'')+'" onclick="'+(thumb?'openLB(\''+su(thumb)+'\',event)':'')+'">'+
          (thumb?'<img src="'+thumb+'" alt=""><button class="color-photo-x" onclick="confirmAction(\'Remove color photo?\',function(){removeColorThumb(\''+c.id+'\')})">&#x2715;</button>':'<span class="color-photo-ico">&#128247;</span><div class="color-photo-hov">&#128247; drop or click</div>')+
          '</div><button class="btn-ico" onclick="confirmAction(\'Remove color?\',function(){removeColor(\''+c.id+'\')})">&#x2715;</button></div>';
      });
    } else {
      html+='<div style="padding:20px;text-align:center;color:var(--text3);font-size:14px">No colors yet. Click &quot;+ Add&quot;.</div>';
    }
    html+='</div>';
    // Right column: Submodels + Notes
    html+='<div style="display:flex;flex-direction:column;gap:16px"><div class="sec"><div class="sec-hdr"><span class="sec-title">Submodels / Trims</span><button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="addSubmodel()">+ Add</button></div>';
    if((p.submodels||[]).length){
      (p.submodels||[]).forEach(function(s,i){
        var name=typeof s==='string'?s:(s.name||'');
        var years=typeof s==='string'?'All years':(s.years||'All years');
        html+='<div class="sub-row"><input class="sub-name" value="'+esc(name)+'" placeholder="Submodel name..." oninput="updateSubmodel('+i+',\'name\',this.value)"><input class="sub-years" value="'+esc(years)+'" placeholder="All years" oninput="updateSubmodel('+i+',\'years\',this.value)"><button class="btn-ico" onclick="confirmAction(\'Remove this submodel?\',function(){removeSubmodel('+i+')})">&#x2715;</button></div>';
      });
    } else {
      html+='<div style="padding:14px;text-align:center;color:var(--text3);font-size:14px">No submodels added.</div>';
    }
    html+='</div><div class="sec"><div class="sec-hdr"><span class="sec-title">Additional notes</span></div><div class="sec-body"><textarea class="notes-textarea" id="ta-notes" placeholder="Fitment warnings, caveats, installation notes..." oninput="markDirty()">'+esc(p.notes||'')+'</textarea></div></div></div>';
    html+='</div>'; // end info-grid
  } else if(activeTab==='photos'){
    html+=buildPhotoTab('Product photos','prod-drop','product',prod);
  } else if(activeTab==='before_after'){
    html+=buildPhotoTab('Before & after \u2014 customer photos','ba-drop','before_after',ba);
  } else if(activeTab==='research'){
    html+='<div class="sec" style="margin-bottom:16px"><div class="sec-hdr"><span class="sec-title">Research summary</span><span style="margin-left:auto;font-size:12px;color:var(--text3)">Drag images in \xb7 Click image then drag corner to resize</span></div><div>'+
      '<div class="rich-toolbar">'+
      '<button class="rich-btn" onclick="fmt(\'bold\')"><b>B</b></button>'+
      '<button class="rich-btn" onclick="fmt(\'italic\')"><i>I</i></button>'+
      '<button class="rich-btn" onclick="fmt(\'underline\')"><u>U</u></button>'+
      '<div class="rich-sep"></div>'+
      '<button class="rich-btn" onclick="fmt(\'insertUnorderedList\')">&bull; List</button>'+
      '<button class="rich-btn" onclick="fmt(\'insertOrderedList\')">1. List</button>'+

// ── UNDO / REDO ──────────────────────────────────────────
var undoStack=[],redoStack=[],lastSnapshot='';
function snapshot(){
  var p=getP();if(!p)return;
  collectText();
  var s=JSON.stringify({research:p.research,notes:p.notes,submodels:p.submodels,other_positions:p.other_positions,materials:p.materials,positions:p.positions});
  if(s===lastSnapshot)return;
  undoStack.push(lastSnapshot);
  if(undoStack.length>40)undoStack.shift();
  redoStack=[];
  lastSnapshot=s;
}
function applySnapshot(s){
  var p=getP();if(!p||!s)return;
  var d=JSON.parse(s);
  Object.assign(p,d);
  renderPattern();markDirty();
}
function undo(){if(!undoStack.length){toast('Nothing to undo','err');return;}var prev=undoStack.pop();redoStack.push(lastSnapshot);lastSnapshot=prev;applySnapshot(prev);toast('Undone');}
function redo(){if(!redoStack.length){toast('Nothing to redo','err');return;}var next=redoStack.pop();undoStack.push(lastSnapshot);lastSnapshot=next;applySnapshot(next);toast('Redone');}
document.addEventListener('keydown',function(e){
  var meta=e.metaKey||e.ctrlKey;
  if(!meta)return;
  if(e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
  else if((e.key==='y')||(e.key==='z'&&e.shiftKey)){e.preventDefault();redo();}
});

// Snapshot on meaningful changes (debounced)
var snapshotTimer=null;
var origMarkDirty=markDirty;
markDirty=function(){origMarkDirty();clearTimeout(snapshotTimer);snapshotTimer=setTimeout(snapshot,800);};

async function toggleMaterial(mat){
  var p=getP();
  var stdMats=MATERIALS.slice(0,-1);
  if(mat==='Other'){
    // Toggle Other: remove any custom other strings and the literal 'Other', or add 'Other'
    var hasOther=p.materials.some(function(m){return !stdMats.includes(m);});
    if(hasOther){p.materials=p.materials.filter(function(m){return stdMats.includes(m);});}
    else{p.materials.push('Other');}
  } else {
    var idx=p.materials.indexOf(mat);
    if(idx>-1)p.materials.splice(idx,1);else p.materials.push(mat);
  }
  await supa.from('patterns').update({materials:p.materials,updated_at:new Date().toISOString()}).eq('id',p.id);
  renderPattern();toast('Saved \u2713');
}

var selectedImg=null;
function onEditorClick(e){
  if(e.target.tagName==='IMG'){selectedImg=e.target;document.querySelectorAll('.rich-editor img').forEach(function(img){img.classList.remove('img-sel');});selectedImg.classList.add('img-sel');}
  else{selectedImg=null;document.querySelectorAll('.rich-editor img').forEach(function(img){img.classList.remove('img-sel');});}
}
function onEditorMouseDown(e){if(e.target.tagName==='IMG'){var img=e.target,rect=img.getBoundingClientRect();if(e.clientX>rect.right-16&&e.clientY>rect.bottom-16)img.style.cursor='nwse-resize';else img.style.cursor='default';}}
function resizeImg(factor){
  if(!selectedImg){toast('Click an image in the editor first','err');return;}
  var ed=document.getElementById('rich-editor');var edW=(ed?ed.offsetWidth:640)-28;
  if(factor==='px'){var w=prompt('Width in pixels (e.g. 300):');if(!w||isNaN(parseInt(w)))return;selectedImg.style.width=parseInt(w)+'px';selectedImg.style.height='auto';}
  else{selectedImg.style.width=Math.round(edW*factor)+'px';selectedImg.style.height='auto';}
  markDirty();
}
function initEditorImgResize(){
  var ed=document.getElementById('rich-editor');if(!ed)return;
  ed.addEventListener('mousedown',function(e){
    if(e.target.tagName!=='IMG')return;
    var img=e.target,rect=img.getBoundingClientRect();
    if(!(e.clientX>rect.right-16&&e.clientY>rect.bottom-16))return;
    e.preventDefault();var startX=e.clientX,startW=img.offsetWidth;
    function move(ev){img.style.width=Math.max(60,startW+(ev.clientX-startX))+'px';img.style.height='auto';}
    function up(){document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);markDirty();}
    document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
  });
}

async function addPattern(){
  var brand=document.getElementById('nm-brand').value.trim(),model=document.getElementById('nm-model').value.trim(),years=document.getElementById('nm-years').value.trim(),trim=document.getElementById('nm-trim').value.trim();
  if(!brand||!model||!years){alert('Brand, Model and Years are required.');return;}
  var btn=document.getElementById('add-confirm-btn');btn.disabled=true;btn.textContent='Adding...';
  var defPos={front_bottom:false,front_top:false,rear_bottom:false,rear_top:false};
  var res=await supa.from('patterns').insert({brand:brand,model:model,years:years,trim:trim,research:'',notes:'',submodels:[],materials:[],positions:defPos,other_positions:[]}).select().single();
  btn.disabled=false;btn.textContent='Add Pattern';
  if(res.error){toast('Error: '+res.error.message,'err');return;}
  var full=Object.assign({},res.data,{colors:[],pdfs:[],photos:[],submodels:[],materials:[],positions:defPos,other_positions:[]});
  patterns.push(full);patterns.sort(function(a,b){return a.brand.localeCompare(b.brand)||a.model.localeCompare(b.model);});
  document.getElementById('brand-dl').innerHTML=[...new Set(patterns.map(function(p){return p.brand;}))].sort().map(function(b){return '<option value="'+b+'">';}).join('');
  closeAddModal();['nm-brand','nm-model','nm-years','nm-trim'].forEach(function(id){document.getElementById(id).value='';});
  selectPattern(res.data.id);toast('Pattern added \u2713');
}

function fileToDataUrl(file){return new Promise(function(res){var r=new FileReader();r.onload=function(ev){res(ev.target.result);};r.readAsDataURL(file);});}
function toast(msg,type){type=type||'ok';var el=document.getElementById('toast');el.textContent=msg;el.className='toast '+type;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(function(){el.classList.remove('show');},2800);}
