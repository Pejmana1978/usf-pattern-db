<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USF Pattern Database</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#17183B;
  --navy2:#1f2048;
  --navy-light:rgba(23,24,59,0.06);
  --navy-lighter:rgba(23,24,59,0.03);
  --gold:#C9B27E;
  --gold2:#b89d68;
  --gold-bg:rgba(201,178,126,0.1);
  --gold-border:rgba(201,178,126,0.3);
  --red:#AF0129;
  --red-bg:rgba(175,1,41,0.06);
  --red-border:rgba(175,1,41,0.2);
  --light-blue:#AAC5D1;
  --light-blue-bg:rgba(170,197,209,0.15);
  --bg:#ffffff;
  --bg2:#f8f7f5;
  --bg3:#f2f0ec;
  --border:#e8e4dc;
  --border2:#d8d2c8;
  --text:var(--navy);
  --text2:rgba(23,24,59,0.65);
  --text3:rgba(23,24,59,0.4);
  --green:#1a7a4a;
  --green-bg:rgba(26,122,74,0.07);
  --green-border:rgba(26,122,74,0.2);
  --radius:8px;
  --font:'DM Sans',sans-serif;
  --shadow:0 1px 3px rgba(23,24,59,0.08), 0 1px 2px rgba(23,24,59,0.05);
  --shadow-md:0 4px 12px rgba(23,24,59,0.1), 0 2px 4px rgba(23,24,59,0.06);
}
body{font-family:var(--font);background:var(--bg);color:var(--navy);min-height:100vh;font-size:14px;line-height:1.5}
.app{display:grid;grid-template-columns:268px 1fr;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{background:var(--navy);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.logo-icon{width:32px;height:32px;flex-shrink:0}
.logo-text{font-size:13px;font-weight:600;color:#fff;letter-spacing:0.01em;line-height:1.2}
.logo-sub{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:0.08em;text-transform:uppercase;margin-top:1px}
.search-box{position:relative}
.search-box input{width:100%;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:var(--radius);padding:8px 10px 8px 32px;color:#fff;font-family:var(--font);font-size:13px;outline:none;transition:all 0.2s}
.search-box input:focus{background:rgba(255,255,255,0.1);border-color:rgba(201,178,126,0.4)}
.search-box input::placeholder{color:rgba(255,255,255,0.3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3);font-size:14px;pointer-events:none}

.brand-list{flex:1;overflow-y:auto;padding:8px 0}
.brand-list::-webkit-scrollbar{width:3px}
.brand-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}

.brand-header{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;user-select:none;transition:background 0.15s}
.brand-header:hover{background:rgba(255,255,255,0.05)}
.brand-header.open{background:rgba(201,178,126,0.12)}
.brand-chevron{font-size:9px;color:rgba(255,255,255,0.3);transition:transform 0.2s;flex-shrink:0}
.brand-chevron.open{transform:rotate(90deg);color:var(--gold)}
.brand-name{font-size:13px;font-weight:500;color:rgba(255,255,255,0.85);flex:1}
.brand-count{font-size:10px;color:rgba(255,255,255,0.35);background:rgba(255,255,255,0.08);padding:1px 6px;border-radius:10px;font-weight:500}

.pattern-list{display:none;padding-bottom:4px}
.pattern-list.open{display:block}
.pattern-item{padding:7px 16px 7px 36px;cursor:pointer;font-size:12.5px;color:rgba(255,255,255,0.55);transition:all 0.15s;border-left:2px solid transparent;margin-left:0}
.pattern-item:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.04)}
.pattern-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(201,178,126,0.1)}
.pattern-item-name{font-weight:500;margin-bottom:3px;line-height:1.3}
.badge-row{display:flex;gap:3px;flex-wrap:wrap}
.badge{font-size:10px;padding:1px 5px;border-radius:3px;font-weight:500}
.badge.has{background:rgba(26,122,74,0.2);color:#5cb88a}
.badge.warn{background:rgba(201,178,126,0.2);color:var(--gold)}
.badge.miss{background:rgba(175,1,41,0.2);color:#e05252}

.sidebar-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.btn-add{width:100%;background:var(--gold);color:var(--navy);border:none;border-radius:var(--radius);padding:9px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:background 0.2s;letter-spacing:0.01em}
.btn-add:hover{background:var(--gold2)}
.btn-add:disabled{opacity:0.5;cursor:not-allowed}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.main-header{padding:0 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;min-height:52px;background:var(--bg)}
.breadcrumb{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.breadcrumb .sep{color:var(--border2)}
.breadcrumb .current{color:var(--navy);font-weight:500}
.header-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.hdr-status{font-size:12px;color:var(--text3)}
.hdr-status.saved{color:var(--green)}
.hdr-status.saving{color:var(--gold2)}

.btn{padding:6px 14px;border-radius:var(--radius);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy2)}
.btn-danger{background:transparent;border:1px solid var(--red-border);color:var(--red)}
.btn-danger:hover{background:var(--red-bg)}
.btn-gold{background:var(--gold);color:var(--navy);font-weight:600}
.btn-gold:hover{background:var(--gold2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn:disabled{opacity:0.45;cursor:not-allowed}

.content{flex:1;overflow-y:auto;padding:24px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:14px;text-align:center}
.empty-icon{font-size:52px;opacity:0.2}
.empty-title{font-size:17px;font-weight:600;color:var(--text2)}
.empty-sub{font-size:13px;max-width:260px;line-height:1.7;color:var(--text3)}

/* ── PATTERN DETAIL ── */
.pattern-title-area{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.pattern-title{font-size:22px;font-weight:600;color:var(--navy);letter-spacing:-0.02em;line-height:1.2}
.pattern-sub{font-size:14px;color:var(--text2);margin-top:4px}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:border-color 0.15s}
.stat-card:hover{border-color:var(--border2)}
.stat-value{font-size:24px;font-weight:600;color:var(--navy);letter-spacing:-0.02em}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.progress-wrap{margin-bottom:20px}
.progress-meta{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px}
.progress-meta span:first-child{color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.04em;font-size:11px}
.progress-meta span:last-child{color:var(--gold2);font-weight:600}
.progress-bar{background:var(--bg3);border-radius:10px;height:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:10px;transition:width 0.4s}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;white-space:nowrap}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--navy);border-bottom-color:var(--gold)}

/* Sections */
.section{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
.section-header{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--bg2)}
.section-icon{font-size:14px;flex-shrink:0}
.section-title{font-size:12px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:0.05em}
.section-body{padding:16px}

/* Form */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em}
.form-input{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 11px;color:var(--navy);font-family:var(--font);font-size:13px;outline:none;transition:all 0.2s}
.form-input:focus{border-color:var(--gold-border);background:var(--bg);box-shadow:0 0 0 3px var(--gold-bg)}
.form-input::placeholder{color:var(--text3)}
.form-select{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:8px 11px;color:var(--navy);font-family:var(--font);font-size:13px;outline:none}
textarea.form-input{resize:vertical;min-height:110px;line-height:1.65}

/* Tags */
.tag-list{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tag{background:var(--navy-light);border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-size:12px;color:var(--navy);display:flex;align-items:center;gap:6px;font-weight:500}
.tag .remove{cursor:pointer;color:var(--text3);font-size:10px;line-height:1;transition:color 0.15s}
.tag .remove:hover{color:var(--red)}
.tag-input{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:4px 8px;color:var(--navy);font-family:var(--font);font-size:12px;outline:none;width:130px;transition:border-color 0.2s}
.tag-input:focus{border-color:var(--gold-border)}

/* Colors table */
.colors-table{width:100%;border-collapse:collapse}
.colors-table th{text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;padding:7px 12px;border-bottom:1px solid var(--border);background:var(--bg2)}
.colors-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.colors-table tr:last-child td{border-bottom:none}
.colors-table tr:hover td{background:var(--navy-lighter)}
.color-cell{display:flex;align-items:center;gap:9px}
.color-swatch{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);flex-shrink:0;box-shadow:var(--shadow)}
.trim-code{font-size:11px;color:var(--text2);background:var(--bg3);padding:2px 7px;border-radius:4px;font-weight:500;border:1px solid var(--border)}
.year-note{font-size:11px;color:var(--text3)}
.btn-icon{background:transparent;border:none;cursor:pointer;color:var(--text3);padding:4px 7px;border-radius:4px;transition:all 0.15s;font-size:13px;line-height:1}
.btn-icon:hover{background:var(--red-bg);color:var(--red)}

/* Positions */
.positions-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.position-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px;cursor:pointer;transition:all 0.15s;position:relative}
.position-card:hover{border-color:var(--border2);background:var(--bg3)}
.position-card.has{border-color:var(--green);background:var(--green-bg)}
.position-name{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:2px}
.position-status{font-size:11px;font-weight:500}
.position-card.has .position-status{color:var(--green)}
.position-card:not(.has) .position-status{color:var(--text3)}
.position-check{position:absolute;top:9px;right:9px;font-size:12px;color:var(--green);font-weight:600}

/* Materials */
.materials-row{display:flex;gap:8px;flex-wrap:wrap}
.mat-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:7px 16px;font-size:13px;cursor:pointer;transition:all 0.15s;font-family:var(--font);color:var(--text2);font-weight:500}
.mat-btn:hover{border-color:var(--border2);color:var(--navy)}
.mat-btn.on{background:var(--gold-bg);border-color:var(--gold-border);color:var(--navy);font-weight:600}

/* ── PHOTOS ── */
.photo-drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:32px 20px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg2)}
.photo-drop-zone:hover,.photo-drop-zone.dragover{border-color:var(--gold);background:var(--gold-bg)}
.drop-icon{font-size:32px;opacity:0.25;margin-bottom:10px}
.drop-text{font-size:13px;color:var(--text2);font-weight:500}
.drop-sub{font-size:11px;color:var(--text3);margin-top:4px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:14px}
.photo-thumb{aspect-ratio:4/3;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative;cursor:pointer;box-shadow:var(--shadow)}
.photo-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.photo-thumb-overlay{position:absolute;inset:0;background:rgba(23,24,59,0.6);display:none;align-items:center;justify-content:center;gap:8px}
.photo-thumb:hover .photo-thumb-overlay{display:flex}
.photo-caption-bar{position:absolute;bottom:0;left:0;right:0;padding:5px 7px;background:rgba(23,24,59,0.75);font-size:10px;color:#fff;line-height:1.3}
.photo-del-btn{background:rgba(175,1,41,0.85);border:none;border-radius:4px;color:#fff;cursor:pointer;padding:4px 8px;font-size:11px;font-family:var(--font)}

/* Research editor */
.rich-toolbar{display:flex;gap:4px;padding:8px 10px;border:1px solid var(--border);border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;background:var(--bg2);flex-wrap:wrap}
.rich-btn{background:transparent;border:1px solid transparent;border-radius:4px;padding:3px 7px;cursor:pointer;font-size:12px;font-family:var(--font);color:var(--text2);transition:all 0.15s;line-height:1.4}
.rich-btn:hover{background:var(--bg3);border-color:var(--border);color:var(--navy)}
.rich-btn.active{background:var(--navy-light);border-color:var(--border);color:var(--navy);font-weight:600}
.rich-sep{width:1px;background:var(--border);margin:0 3px;align-self:stretch}
.rich-editor{border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);padding:12px;min-height:160px;outline:none;font-family:var(--font);font-size:13px;line-height:1.7;color:var(--navy);background:var(--bg)}
.rich-editor:focus{border-color:var(--gold-border);box-shadow:0 0 0 3px var(--gold-bg)}
.rich-editor img{max-width:100%;border-radius:4px;margin:6px 0;border:1px solid var(--border)}
.rich-editor b,.rich-editor strong{font-weight:600}
.rich-editor p{margin-bottom:8px}

/* PDFs */
.pdf-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.pdf-item{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);transition:border-color 0.15s}
.pdf-item:hover{border-color:var(--border2)}
.pdf-name{font-size:13px;flex:1;color:var(--navy);font-weight:500}
.pdf-meta{font-size:11px;color:var(--text3)}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(23,24,59,0.5);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(6px)}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:12px;width:500px;max-height:88vh;overflow-y:auto;padding:24px;box-shadow:var(--shadow-md)}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.modal-title{font-size:17px;font-weight:600;margin-bottom:20px;color:var(--navy)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--navy);border-radius:var(--radius);padding:10px 16px;font-size:13px;color:#fff;box-shadow:var(--shadow-md);transform:translateY(60px);opacity:0;transition:all 0.3s;z-index:200;max-width:300px;font-weight:500}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:var(--green)}
.toast.err{background:var(--red)}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;gap:16px}
.loading-spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text3);font-weight:500}
.loading-logo{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.loading-logo-text{font-size:16px;font-weight:600;color:var(--navy)}

input[type=color]{width:100%;height:38px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg2);cursor:pointer;padding:3px}
</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-logo">
    <svg width="28" height="28" viewBox="0 0 100 100" fill="none"><rect width="100" height="100" rx="12" fill="#17183B"/><path d="M20 28h60v8H20zM28 40h44v22H28zM32 66h36v8H32z" fill="#C9B27E"/></svg>
    <span class="loading-logo-text">United Seat Factory</span>
  </div>
  <div class="loading-spinner"></div>
  <div class="loading-text">Connecting to database...</div>
</div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 100 100" fill="none"><rect width="100" height="100" rx="10" fill="#C9B27E" fill-opacity="0.15"/><path d="M18 26h64v9H18zM26 39h48v24H26zM30 67h40v9H30z" fill="#C9B27E"/></svg>
        <div>
          <div class="logo-text">United Seat Factory</div>
          <div class="logo-sub">Pattern Database</div>
        </div>
      </div>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Search patterns..." oninput="filterSidebar(this.value)">
      </div>
    </div>
    <div class="brand-list" id="brand-list">
      <div style="padding:20px;text-align:center;color:rgba(255,255,255,0.3);font-size:13px">Loading...</div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-add" id="add-btn" onclick="openAddModal()">+ Add Pattern</button>
    </div>
  </div>

  <div class="main">
    <div class="main-header">
      <div class="breadcrumb" id="breadcrumb"><span>Select a pattern to begin</span></div>
      <div class="header-actions" id="header-actions" style="display:none">
        <span class="hdr-status" id="hdr-status"></span>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete()">Delete</button>
        <button class="btn btn-primary btn-sm" id="save-btn" onclick="saveAll()">Save changes</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="empty-state">
        <div class="empty-icon">🪑</div>
        <div class="empty-title">No pattern selected</div>
        <div class="empty-sub">Choose a pattern from the sidebar or add a new one to get started.</div>
      </div>
    </div>
  </div>
</div>

<!-- ADD PATTERN MODAL -->
<div class="modal-overlay" id="add-modal" style="display:none" onclick="if(event.target===this)closeAddModal()">
  <div class="modal">
    <div class="modal-title">Add new pattern</div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Car Brand *</label>
        <input class="form-input" id="nm-brand" placeholder="e.g. Ford, Lexus, Toyota..." list="brand-dl">
        <datalist id="brand-dl"></datalist>
      </div>
      <div class="form-group">
        <label class="form-label">Model *</label>
        <input class="form-input" id="nm-model" placeholder="e.g. Mustang, RX330...">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Year Range *</label>
        <input class="form-input" id="nm-years" placeholder="e.g. 2004-2009">
      </div>
      <div class="form-group">

function switchTab(t){collectText();activeTab=t;renderPattern();}

function collectText(){
  const p=getP();if(!p)return;
  const r=document.getElementById('rich-editor');
  const n=document.getElementById('ta-notes');
  if(r)p.research=r.innerHTML;
  if(n)p.notes=n.value;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── RICH EDITOR ──
function fmt(cmd){document.execCommand(cmd,false,null);document.getElementById('rich-editor').focus();markDirty();}

function handlePaste(e){
  const items=e.clipboardData.items;
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      const blob=item.getAsFile();
      const reader=new FileReader();
      reader.onload=ev=>{
        document.execCommand('insertImage',false,ev.target.result);
        markDirty();
      };
      reader.readAsDataURL(blob);
      return;
    }
  }
}

function insertResearchImage(){
  currentPhotoType='research-inline';
  document.getElementById('file-input').accept='image/*';
  document.getElementById('file-input').multiple=false;
  document.getElementById('file-input').click();
}

// ── DRAG & DROP PHOTOS ──
function onDragOver(e,id){e.preventDefault();document.getElementById(id).classList.add('dragover');}
function onDragLeave(id){document.getElementById(id).classList.remove('dragover');}
function onDrop(e,type){
  e.preventDefault();
  const id=type==='product'?'product-drop':'ba-drop';
  document.getElementById(id).classList.remove('dragover');
  const files=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
  if(files.length)uploadPhotos(files,type);
}

function triggerFileInput(type){
  currentPhotoType=type;
  document.getElementById('file-input').accept='image/*';
  document.getElementById('file-input').multiple=true;
  document.getElementById('file-input').click();
}

function handleFileInput(e){
  const files=Array.from(e.target.files);
  e.target.value='';
  if(!files.length)return;
  if(currentPhotoType==='research-inline'){
    const reader=new FileReader();
    reader.onload=ev=>{
      const ed=document.getElementById('rich-editor');
      if(ed){ed.focus();document.execCommand('insertImage',false,ev.target.result);markDirty();}
    };
    reader.readAsDataURL(files[0]);
  } else {
    uploadPhotos(files.filter(f=>f.type.startsWith('image/')),currentPhotoType);
  }
}

async function uploadPhotos(files,type){
  const p=getP();if(!p)return;
  toast('Uploading '+files.length+' photo(s)...','');
  for(const file of files){
    const reader=new FileReader();
    await new Promise(resolve=>{
      reader.onload=async ev=>{
        // Store as base64 data URL (no external storage needed for now)
        const url=ev.target.result;
        const {data,error}=await db.from('pattern_photos').insert({pattern_id:p.id,url,type,caption:file.name.replace(/\.[^.]+$/,'')}).select().single();
        if(!error&&data)p.photos.push(data);
        resolve();
      };
      reader.readAsDataURL(file);
    });
  }
  renderPattern();
  toast(files.length+' photo(s) added ✓');
}

async function removePhoto(id,e){
  if(e)e.stopPropagation();
  if(!confirm('Remove this photo?'))return;
  const p=getP();
  const {error}=await db.from('pattern_photos').delete().eq('id',id);
  if(error){toast('Error: '+error.message,'err');return;}
  p.photos=p.photos.filter(ph=>ph.id!==id);
  renderPattern();toast('Photo removed');
}

// ── POSITIONS ──
async function togglePosition(posId){
  const p=getP();p.positions[posId]=!p.positions[posId];
  const {error}=await db.from('patterns').update({positions:p.positions,updated_at:new Date().toISOString()}).eq('id',p.id);
  if(error){toast('Error: '+error.message,'err');return;}
  toast('Saved ✓');buildSidebar();renderPattern();
}

// ── MATERIALS ──
async function toggleMaterial(mat){
  const p=getP();const idx=(p.materials||[]).indexOf(mat);
  if(idx>-1)p.materials.splice(idx,1);else p.materials.push(mat);
  const {error}=await db.from('patterns').update({materials:p.materials,updated_at:new Date().toISOString()}).eq('id',p.id);
  if(error){toast('Error: '+error.message,'err');return;}
  toast('Saved ✓');renderPattern();
}

function addSubmodelKey(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const val=e.target.value.trim().replace(/,$/,'');
    if(!val)return;
    const p=getP();p.submodels.push(val);e.target.value='';
    markDirty();renderPattern();
  }
}
function removeSubmodel(i){const p=getP();p.submodels.splice(i,1);markDirty();renderPattern();}

// ── SAVE ──
async function saveAll(){
  if(saving)return;
  collectText();
  const p=getP();if(!p)return;
  saving=true;setStatus('Saving...','saving');
  const btn=document.getElementById('save-btn');if(btn)btn.disabled=true;
  const {error}=await db.from('patterns').update({research:p.research,notes:p.notes,submodels:p.submodels,updated_at:new Date().toISOString()}).eq('id',p.id);
  saving=false;if(btn)btn.disabled=false;
  if(error){toast('Save failed: '+error.message,'err');setStatus('Save failed');return;}
  unsaved=false;setStatus('Saved ✓','saved');buildSidebar();toast('Pattern saved ✓');
}

// ── COLORS ──
function openColorModal(){document.getElementById('color-modal').style.display='flex';}
function closeColorModal(){document.getElementById('color-modal').style.display='none';}
async function addColor(){
  const name=document.getElementById('c-name').value.trim();
  if(!name){alert('Color name required.');return;}
  const code=document.getElementById('c-code').value.trim();
  const hex=document.getElementById('c-hex').value;
  const year_note=document.getElementById('c-years').value.trim();
  const p=getP();
  const {data,error}=await db.from('pattern_colors').insert({pattern_id:p.id,name,code,hex,year_note,sort_order:p.colors.length}).select().single();
  if(error){toast('Error: '+error.message,'err');return;}
  p.colors.push(data);closeColorModal();
  ['c-name','c-code','c-years'].forEach(id=>document.getElementById(id).value='');
  buildSidebar();renderPattern();toast('Color added ✓');
}
async function removeColor(id){
  if(!confirm('Remove this color?'))return;
  const p=getP();
  const {error}=await db.from('pattern_colors').delete().eq('id',id);
  if(error){toast('Error: '+error.message,'err');return;}
  p.colors=p.colors.filter(c=>c.id!==id);buildSidebar();renderPattern();toast('Color removed');
}

// ── PDFS ──
function openPdfInput(){
  const name=prompt('PDF name (e.g. "Lexus RX330 OEM Color Guide.pdf"):');
  if(!name)return;
  const url=prompt('Google Drive or Dropbox link (optional — press Enter to skip):');
  savePdf(name.trim(),url?url.trim():null,null);
}
async function savePdf(name,url,size_label){
  const p=getP();
  const {data,error}=await db.from('pattern_pdfs').insert({pattern_id:p.id,name,url,size_label}).select().single();
  if(error){toast('Error: '+error.message,'err');return;}
  p.pdfs.push(data);buildSidebar();renderPattern();toast('PDF added ✓');
}
async function removePdf(id){
  if(!confirm('Remove this PDF?'))return;
  const p=getP();
  const {error}=await db.from('pattern_pdfs').delete().eq('id',id);
  if(error){toast('Error: '+error.message,'err');return;}
  p.pdfs=p.pdfs.filter(f=>f.id!==id);buildSidebar();renderPattern();toast('PDF removed');
}

// ── ADD PATTERN ──
function openAddModal(){document.getElementById('add-modal').style.display='flex';}
function closeAddModal(){document.getElementById('add-modal').style.display='none';}
async function addPattern(){
  const brand=document.getElementById('nm-brand').value.trim();
  const model=document.getElementById('nm-model').value.trim();
  const years=document.getElementById('nm-years').value.trim();
  const trim=document.getElementById('nm-trim').value.trim();
  if(!brand||!model||!years){alert('Brand, Model and Year Range are required.');return;}
  const btn=document.getElementById('add-confirm-btn');
  btn.disabled=true;btn.textContent='Adding...';
  const defPos={};POSITIONS.forEach(p=>defPos[p.id]=false);
  const {data,error}=await db.from('patterns').insert({brand,model,years,trim,research:'',notes:'',submodels:[],materials:[],positions:defPos}).select().single();
  btn.disabled=false;btn.textContent='Add Pattern';
  if(error){toast('Error: '+error.message,'err');return;}
  const full={...data,colors:[],pdfs:[],photos:[],submodels:[],materials:[],positions:defPos};
  patterns.push(full);patterns.sort((a,b)=>a.brand.localeCompare(b.brand)||a.model.localeCompare(b.model));
  updateBrandDl();closeAddModal();
  ['nm-brand','nm-model','nm-years','nm-trim'].forEach(id=>document.getElementById(id).value='');
  selectPattern(data.id);toast('Pattern added ✓');
}

// ── DELETE ──
async function confirmDelete(){
  const p=getP();
  if(!confirm(`Delete "${p.brand} ${p.model} ${p.years}"?\n\nThis will permanently delete all colors, PDFs and photos for this pattern. This cannot be undone.`))return;
  const {error}=await db.from('patterns').delete().eq('id',p.id);
  if(error){toast('Error: '+error.message,'err');return;}
  patterns=patterns.filter(x=>x.id!==p.id);currentId=null;
  buildSidebar();
  document.getElementById('content').innerHTML=`<div class="empty-state"><div class="empty-icon">🪑</div><div class="empty-title">Pattern deleted</div><div class="empty-sub">Select another pattern or add a new one.</div></div>`;
  document.getElementById('header-actions').style.display='none';
  document.getElementById('breadcrumb').innerHTML='<span>Select a pattern to begin</span>';
  toast('Pattern deleted');
}

// ── TOAST ──
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2800);
}

init();
</script>
